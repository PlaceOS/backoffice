<div class="searchbar" [class.dark-mode]="dark_mode" widget>
    <div class="field" [class.focus]="model.focus || filter || model.dictate">
        <button mat-icon-button (click)="focusInput()">
            <app-icon [icon]="{ class: 'backoffice-magnifying-glass' }"></app-icon>
        </button>
        <div class="input">
            <input
                #input
                [(ngModel)]="filter"
                (ngModelChange)="post()"
                (focus)="model.focus = true; focus.emit($event)"
                (blur)="model.focus = false; blur.emit($event)"
                [placeholder]="placeholder"
            />
        </div>
        <button
            mat-icon-button
            *ngIf="model.speech && dictation && (model.focus || model.dictate)"
            [class.active]="model.dictate"
            (click)="startDictation()"
        >
            <app-icon [icon]="{ class: 'backoffice-mic' }"></app-icon>
        </button>
        <button mat-icon-button class="close" *ngIf="filter && clearable" (click)="clear()">
            <app-icon [icon]="{ class: 'backoffice-cross' }"></app-icon>
        </button>
        <ng-content></ng-content>
    </div>
</div>
